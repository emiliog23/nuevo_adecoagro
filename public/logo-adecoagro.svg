<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" fill="none">
  <!-- Circular mark -->
  <g transform="translate(8, 8)">
    <!-- Outer arcs - alternating black and green, concentric -->
    <!-- Arc set 1 (outermost) - black -->
    <path d="M52,8 A44,44 0 0,1 96,52" stroke="#2B2B2B" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Arc set 2 - green -->
    <path d="M52,14 A38,38 0 0,1 90,52" stroke="#1C6B30" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Arc set 3 - black -->
    <path d="M52,20 A32,32 0 0,1 84,52" stroke="#2B2B2B" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Arc set 4 - green -->
    <path d="M52,26 A26,26 0 0,1 78,52" stroke="#1C6B30" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Arc set 5 - black -->
    <path d="M52,32 A20,20 0 0,1 72,52" stroke="#2B2B2B" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Arc set 6 - green -->
    <path d="M52,38 A14,14 0 0,1 66,52" stroke="#1C6B30" stroke-width="4.5" stroke-linecap="round" fill="none"/>

    <!-- Bottom horizontal lines -->
    <!-- Line 1 - black -->
    <path d="M8,64 A44,44 0 0,0 52,96" stroke="#2B2B2B" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Line 2 - green -->
    <path d="M14,64 A38,38 0 0,0 52,90" stroke="#1C6B30" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Line 3 - black -->
    <path d="M20,64 A32,32 0 0,0 52,84" stroke="#2B2B2B" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Line 4 - green -->
    <path d="M26,64 A26,26 0 0,0 52,78" stroke="#1C6B30" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Line 5 - black -->
    <path d="M32,64 A20,20 0 0,0 52,72" stroke="#2B2B2B" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Line 6 - green -->
    <path d="M38,64 A14,14 0 0,0 52,66" stroke="#1C6B30" stroke-width="4.5" stroke-linecap="round" fill="none"/>

    <!-- Vertical divider line -->
    <line x1="52" y1="6" x2="52" y2="98" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round"/>
    <!-- Horizontal divider line -->
    <line x1="6" y1="52" x2="98" y2="52" stroke="#2B2B2B" stroke-width="2" stroke-linecap="round"/>

    <!-- Circle border -->
    <circle cx="52" cy="52" r="46" stroke="#2B2B2B" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Text: "adeco" dark charcoal + "agro" green -->
  <text x="118" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="500" letter-spacing="-1" fill="#2B2B2B">adeco</text>
  <text x="298" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-size="58" font-weight="500" letter-spacing="-1" fill="#1C6B30">agro</text>
</svg>
